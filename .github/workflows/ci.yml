name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || echo "No package-lock.json yet — skipping install"

      # TODO: Enable when toolchain is set up
      # - name: Lint
      #   run: npm run lint

      # TODO: Enable when toolchain is set up
      # - name: Type Check
      #   run: npm run typecheck

      # TODO: Enable when toolchain is set up
      # - name: Test
      #   run: npm test

      - name: Repo Map (validation)
        run: node scripts/generate_repo_map.js

      - name: Verify Evidence Template
        run: |
          test -f Evidence/_template/evidence.json
          test -f Evidence/README.md
          echo "✅ Evidence system intact"

      - name: Verify Agent Onboarding
        run: |
          test -f .agent/START_HERE.md
          test -f .agent/MAP.md
          test -f .agent/COMMANDS.md
          test -f .agent/RULES.md
          echo "✅ Agent onboarding pack intact"

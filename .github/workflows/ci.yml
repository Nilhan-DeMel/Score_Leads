name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Repo Map (validation)
        run: node scripts/generate_repo_map.cjs

      - name: Verify Evidence Template
        run: |
          test -f Evidence/_template/evidence.json
          test -f Evidence/README.md
          echo "✅ Evidence system intact"

      - name: Verify Agent Onboarding
        run: |
          test -f .agent/START_HERE.md
          test -f .agent/MAP.md
          test -f .agent/COMMANDS.md
          test -f .agent/RULES.md
          echo "✅ Agent onboarding pack intact"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
